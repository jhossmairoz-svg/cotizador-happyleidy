<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cotizador Happy Leidy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f4;padding:20px}
.wrap{max-width:740px;margin:0 auto}
h1{font-size:22px;font-weight:700;color:#c0106a;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:18px}
.sec{background:white;border:1px solid #eee;border-radius:12px;padding:18px;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:700;color:#888;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0;text-transform:uppercase;letter-spacing:.08em}
.row{display:grid;gap:10px;margin-bottom:10px}
.r2{grid-template-columns:1fr 1fr}
label{font-size:11px;color:#888;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
input[type=text],textarea{width:100%;font-family:Arial,sans-serif;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;outline:none;color:#222}
input[type=text]:focus,textarea:focus{border-color:#c0106a}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.svc-card{background:#fdf5f8;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #f0c8d8}
.svc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.svc-num{font-size:12px;font-weight:700;color:#a01258}
.del{background:none;border:none;cursor:pointer;color:#bbb;font-size:20px;line-height:1;padding:0 2px}
.del:hover{color:#e24b4a}
.add-btn{width:100%;padding:10px;border:1.5px dashed #D4537E;border-radius:8px;background:none;color:#a01258;font-size:13px;cursor:pointer;margin-top:6px;font-family:Arial,sans-serif}
.add-btn:hover{background:#fbeaf0}
.img-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-thumb{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #ddd}
.tg{display:flex;gap:10px;margin-top:4px}
.to{flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px solid #eee;border-radius:8px;cursor:pointer;font-size:13px;color:#444}
.to.sel{border-color:#c0106a;background:#fff0f6;color:#c0106a;font-weight:700}
.gen-btn{width:100%;padding:14px;background:#c0106a;border:none;border-radius:10px;color:white;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:Arial,sans-serif}
.gen-btn:hover{background:#900c50}
.gen-btn:disabled{background:#ccc;cursor:not-allowed}
.status{text-align:center;font-size:13px;color:#888;min-height:20px;margin-bottom:10px}
.status.ok{color:#3b6d11}.status.err{color:#a32d2d}
.action-btn{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;background:white;color:#333;font-size:14px;cursor:pointer;margin-bottom:8px;font-family:Arial,sans-serif}
.action-btn:hover{background:#f5f5f5}
.preview-wrap{display:none;margin-top:14px}
.preview-wrap.on{display:block}

.doc-page{background:white;width:816px;height:1056px;margin:0 auto 24px;position:relative;overflow:hidden;font-family:'Architects Daughter','Caveat',cursive;color:#222;border:1px solid #ccc;border-radius:2px}
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:520px;height:520px;object-fit:contain;opacity:0.1;z-index:1;pointer-events:none}
.star-col-left{position:absolute;left:0;width:52px;z-index:2;pointer-events:none}
.star-col-right{position:absolute;right:0;width:52px;z-index:2;pointer-events:none}
.star-col-left span,.star-col-right span{position:absolute;color:#d400a0;line-height:1;display:block}
.page-content{position:relative;z-index:3;padding:48px 80px;height:1056px;display:flex;flex-direction:column;overflow:hidden}
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-shrink:0}
.city-date{font-size:16px;font-weight:700;font-family:'Architects Daughter','Caveat',cursive;color:#222;padding-top:6px}
.logo-img{width:150px;height:150px;object-fit:contain}
.pfooter{margin-top:auto;padding-top:10px;border-top:1px solid #eee;font-size:9px;color:#999;text-align:center;font-family:Arial,sans-serif;flex-shrink:0}
.p1-to{margin-bottom:22px;font-size:15px;line-height:2.2;font-family:'Architects Daughter','Caveat',cursive}
.p1-to strong{font-size:15px;font-weight:700;display:block}
.p1-ref{font-size:15px;font-weight:700;margin-bottom:12px}
.p1-sal{font-size:15px;margin-bottom:22px}
.p1-int{font-size:15px;line-height:2.1;text-align:justify;letter-spacing:0.02em}
.cot-title{font-size:14px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.04em;margin-bottom:22px;flex-shrink:0}
.svc-block{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #ececec}
.svc-block:last-of-type{border-bottom:none}
.svc-inner{display:block}
.svc-left{width:100%}
.svc-right{text-align:right;margin-top:8px;padding-top:8px}
.svc-name{font-size:14px;font-weight:700;margin-bottom:6px}
.svc-desc-list{list-style:disc;padding-left:28px;font-size:13px;line-height:1.9;color:#222}
.svc-desc-list li{margin-bottom:1px}
.svc-price{font-size:14px;font-weight:700;color:#222}
.svc-ret{font-size:13px;font-weight:700;color:#222;margin-top:2px}
.doc-total{text-align:right;font-size:15px;font-weight:700;padding:8px 0;border-top:2px solid #c0106a;margin-top:6px;flex-shrink:0}
.doc-total-only{text-align:center;font-size:15px;font-weight:700;padding:12px 0;border-top:2px solid #c0106a;border-bottom:2px solid #c0106a;margin-top:14px;color:#c0106a;flex-shrink:0}
.doc-ret-only{text-align:center;font-size:13px;font-weight:700;color:#222;margin-top:3px;flex-shrink:0}
.doc-nota{font-size:12px;color:#555;margin-top:12px;font-style:italic;line-height:1.5;flex-shrink:0}
.adicionales-title{font-size:15px;font-weight:700;text-align:center;margin:24px 0 16px}
.adicional-item{font-size:14px;margin-bottom:8px;display:flex;align-items:baseline}
.adicional-dots{flex:1;overflow:hidden;margin:0 4px;letter-spacing:2px}
.adicional-price{white-space:nowrap;font-weight:700}

/* GRID DE IMAGENES en pagina de fotos */
.photos-grid{
  flex:1;
  display:grid;
  gap:16px;
  align-content:start;
}
.photos-grid.cols-1{grid-template-columns:1fr}
.photos-grid.cols-2{grid-template-columns:1fr 1fr}
.photos-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.photos-grid img{
  width:100%;
  object-fit:cover;
  border-radius:16px;
  border:2px solid #f0c8d8;
  display:block;
}
.photos-grid.cols-1 img{height:340px}
.photos-grid.cols-2 img{height:260px}
.photos-grid.cols-3 img{height:200px}

@media print{
  body{background:white;padding:0}
  .form-area,.action-btn,.status{display:none!important}
  .preview-wrap{display:block!important}
  .doc-page{margin:0;page-break-after:always;border:none;width:100%;height:100vh}
  .doc-page:last-child{page-break-after:avoid}
  @page{size:letter;margin:0}
}
</style>
<style>
.screen{display:none}
.screen.active{display:block}
#screen-list{padding:20px;max-width:740px;margin:0 auto}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.list-header h1{font-size:22px;font-weight:700;color:#c0106a}
.new-btn{padding:12px 24px;background:#c0106a;border:none;border-radius:10px;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
.new-btn:hover{background:#900c50}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px;font-family:Arial,sans-serif;outline:none}
.search-box:focus{border-color:#c0106a}
.cot-item{background:white;border:1px solid #eee;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.cot-item:hover{border-color:#c0106a;background:#fff5f8}
.cot-info .cot-cliente{font-size:15px;font-weight:700;color:#222;margin-bottom:3px}
.cot-info .cot-ref{font-size:13px;color:#888}
.cot-info .cot-fecha{font-size:11px;color:#bbb;margin-top:3px}
.cot-actions{display:flex;gap:8px}
.btn-edit{padding:7px 14px;background:#f0f0f0;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:Arial,sans-serif}
.btn-edit:hover{background:#e0e0e0}
.btn-del{padding:7px 10px;background:#fff0f0;border:none;border-radius:8px;cursor:pointer;font-size:13px;color:#c0106a;font-family:Arial,sans-serif}
.btn-del:hover{background:#ffd5d5}
.empty-state{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}
.loading-list{text-align:center;padding:40px;color:#888}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="wrap">
<!-- PANTALLA LISTA -->
<div id="screen-list" class="screen active">
  <div class="list-header">
    <h1>Cotizaciones Happy Leidy</h1>
    <button class="new-btn" onclick="showForm()">+ Nueva cotización</button>
  </div>
  <input type="text" class="search-box" id="search-box" placeholder="Buscar por cliente o evento..." oninput="filterList()">
  <div id="cot-list-container"><div class="loading-list">Cargando cotizaciones...</div></div>
</div>

<!-- PANTALLA FORMULARIO -->
<div id="screen-form" class="screen">
<div class="form-area">
  <h1>Cotizador Happy Leidy</h1>
  <p class="subtitle">Cotizaciones profesionales con corrección automática de ortografía</p>
  <div class="sec">
    <div class="sec-title">Datos del cliente</div>
    <div style="margin-bottom:10px">
      <label>Cliente / Empresa</label>
      <input type="text" id="cli" placeholder="Club Tennis San José">
    </div>
    <div class="row r2">
      <div><label>Fecha</label><input type="text" id="fec" placeholder="noviembre 2025"></div>
      <div><label>Referencia / tipo de evento</label><input type="text" id="ref" placeholder="Comparsa navideña"></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Servicios</div>
    <div id="svc-list"></div>
    <button class="add-btn" onclick="addSvc()">+ Agregar servicio</button>
  </div>
  <div class="sec">
    <div class="sec-title">Mostrar precios en la cotización</div>
    <div class="tg">
      <label class="to sel" id="t1" onclick="selT('det')"><input type="radio" name="pm" value="det" checked style="accent-color:#c0106a"> Por servicio + total</label>
      <label class="to" id="t2" onclick="selT('tot')"><input type="radio" name="pm" value="tot" style="accent-color:#c0106a"> Solo total</label>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Nota final (opcional)</div>
    <textarea id="nota" placeholder="Ej: Precios válidos por 15 días."></textarea>
  </div>
  <div class="sec"><div class="sec-title">Adicionales (opcional)</div><div id="add-list"></div><button class="add-btn" onclick="addAdicional()" style="border-color:#a01258;color:#a01258">+ Agregar adicional</button></div>
  <p class="status" id="st"></p>
  <button class="gen-btn" id="gbtn" onclick="gen()">Generar cotización con IA</button>
</div>

</div><!-- end form-area -->
</div><!-- end screen-form -->

<!-- PANTALLA PREVIEW -->
<div id="screen-preview" class="screen">
<div class="preview-wrap" id="pw" style="display:block">
  <button class="action-btn" id="download-btn" onclick="downloadPDF()">Descargar PDF</button>
  <button class="action-btn" style="background:#e8f5e9;border-color:#4caf50;color:#2e7d32;font-weight:700" onclick="saveCotizacion()">Guardar cotización</button>
  <button class="action-btn" onclick="backEdit()">Editar datos</button>
  <button class="action-btn" onclick="showList()">Ver todas las cotizaciones</button>
  <div id="pages-container"></div>
</div>
</div><!-- end screen-preview -->
</div><!-- end wrap -->

function addStars(el,data,side){
  var maxT=0;
  data.forEach(function(s){
    var sp=document.createElement('span');sp.textContent='★';
    var css='position:absolute;color:#d400a0;font-size:'+s.s+'px;top:'+s.t+'px;';
    css+=side==='left'?'left:'+s.l+'px;':'right:'+s.r+'px;';
    sp.style.cssText=css;el.appendChild(sp);
    if(s.t>maxT)maxT=s.t;
  });
  el.style.height=(maxT+20)+'px';
}

function makePage(hasHdr,cityDate){
  var page=document.createElement('div');page.className='doc-page';
  var sl=document.createElement('div');sl.className='star-col-left';
  var sr=document.createElement('div');sr.className='star-col-right';
  addStars(sl,STARS_LEFT,'left');addStars(sr,STARS_RIGHT,'right');
  page.appendChild(sl);page.appendChild(sr);
  var wm=document.createElement('img');wm.className='watermark';wm.src=LOGO;
  page.appendChild(wm);
  var content=document.createElement('div');content.className='page-content';
  var hdr=document.createElement('div');hdr.className='page-hdr';
  if(hasHdr && cityDate){
    var cd=document.createElement('div');cd.className='city-date';cd.textContent=cityDate;
    hdr.appendChild(cd);
  } else {
    hdr.appendChild(document.createElement('div'));
  }
  var logoEl=document.createElement('img');logoEl.className='logo-img';logoEl.src=LOGO;logoEl.alt='Happy Leidy';
  hdr.appendChild(logoEl);
  content.appendChild(hdr);
  var footer=document.createElement('div');footer.className='pfooter';
  footer.innerHTML='Av canal bogota 11an-31 gualanday &nbsp;|&nbsp; Tel: 5775702 &nbsp;|&nbsp; Cel: 3133124103 - 315560071 &nbsp;|&nbsp; happyleidyrecreacion@hotmail.com';
  content.appendChild(footer);
  page.appendChild(content);
  return{page:page,content:content,footer:footer};
}

function makePhotoPage(imgs){
  var p=makePage(false,'');
  var grid=document.createElement('div');
  var n=imgs.length;
  var cols=n===1?1:n===2?2:n<=4?2:3;
  grid.className='photos-grid cols-'+cols;
  imgs.forEach(function(src){
    var img=document.createElement('img');img.src=src;
    grid.appendChild(img);
  });
  p.content.insertBefore(grid,p.footer);
  return p.page;
}

function gSvcs(){return Array.from(document.querySelectorAll('.svc-card')).map(function(c){var m=c.id.match(/sc-(\d+)/);if(!m)return null;var i=m[1];return{name:(document.getElementById('sn-'+i)||{}).value||'',price:(document.getElementById('sp-'+i)||{}).value||'',desc:(document.getElementById('sd-'+i)||{}).value||'',imgs:si[i]||[]};}).filter(function(s){return s&&s.name.trim();});}
function setStatus(m,t){var el=document.getElementById('st');el.textContent=m;el.className='status'+(t?' '+t:'');}
function backEdit(){document.getElementById('pw').classList.remove('on');document.querySelector('.form-area').style.display='block';}

function buildList(desc){
  var its=(desc||'').split('\n').filter(function(l){return l.trim();}).map(function(l){return'<li>'+l.trim()+'</li>';}).join('');
  return its?'<ul class="svc-desc-list">'+its+'</ul>':'';
}
function svcHtml(s,modo){
  if(modo==='det'){
    return'<div class="svc-block"><div class="svc-inner"><div class="svc-left"><div class="svc-name">&#8226; '+(s.name||'')+'</div>'+buildList(s.desc)+'</div><div class="svc-right"><div class="svc-price">Valor: '+(s.price||'')+'</div></div></div></div>';
  }
  return'<div class="svc-block"><div class="svc-name">&#8226; '+(s.name||'')+'</div>'+buildList(s.desc)+'</div>';
}

async function gen(){
  var cli=document.getElementById('cli').value.trim(),fec=document.getElementById('fec').value.trim(),ref=document.getElementById('ref').value.trim(),nota=document.getElementById('nota').value.trim(),svcs=gSvcs();
  if(!cli||!fec||!ref){setStatus('Completa cliente, fecha y tipo de evento','err');return;}
  if(!svcs.length){setStatus('Agrega al menos un servicio','err');return;}
  var btn=document.getElementById('gbtn');btn.disabled=true;setStatus('Corrigiendo ortografia con IA...');
  var pl={cli:cli,fec:fec,ref:ref,nota:nota,svcs:svcs.map(function(s){return{name:s.name,price:s.price,desc:s.desc};})};
  var cor=pl;
  try{
    var res=await fetch('/.netlify/functions/corregir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,messages:[{role:'user',content:'You are a Spanish spell checker. Fix ONLY spelling and accent errors in the text values of this JSON. Do NOT change words, meaning, or style. Return ONLY valid JSON with no extra text, no markdown, no explanation. Input JSON: '+JSON.stringify(pl)}]})});
    var data=await res.json();
    var txt=(data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    txt=txt.replace(/```json|```/g,'').trim();
    try{cor=JSON.parse(txt);}catch(e){}
  }catch(e){setStatus('Sin conexion. Sin correccion.','err');}
  var ai=svcs.flatMap(function(s){return s.imgs;});
  renderDoc(cor,ai,getPM(),getAdicionales());
  document.querySelector('.form-area').style.display='none';
  document.getElementById('pw').classList.add('on');
  setStatus('Cotizacion lista','ok');btn.disabled=false;
}

function calcTotal(svcs){var t=0;(svcs||[]).forEach(function(s){var n=(s.price||'').replace(/[^0-9]/g,'');if(n)t+=parseInt(n);});return t>0?'$'+t.toLocaleString('es-CO'):null;}

function measureEl(html,w){
  var tmp=document.createElement('div');
  tmp.style.cssText='position:absolute;visibility:hidden;width:'+(w||656)+'px;font-family:Architects Daughter,Caveat,cursive;font-size:14px;line-height:1.9;';
  tmp.innerHTML=html;document.body.appendChild(tmp);
  var h=tmp.offsetHeight;document.body.removeChild(tmp);
  return h;
}

function renderDoc(d,ai,modo,adics){
  var container=document.getElementById('pages-container');
  container.innerHTML='';
  var cityDate='SAN JOSE DE CUCUTA '+(d.fec||'');

  // PAGE 1 - Presentacion
  var p1=makePage(true,cityDate);
  container.appendChild(p1.page);
  var body1=document.createElement('div');
  body1.innerHTML=
    '<div class="p1-to"><span>Se&#241;ores:</span><br><strong>'+(d.cli||'')+'</strong></div>'+
    '<div class="p1-ref"><strong>REF: '+(d.ref||'')+'</strong></div>'+
    '<div class="p1-sal">Cordial Saludo</div>'+
    '<div class="p1-int"><strong>HAPPY LEIDY</strong> es una empresa de servicios en recreaci&#243;n y animaci&#243;n de eventos sociales, empresariales, para ni&#241;os y adultos consolidada en la ciudad. Somos una empresa reconocida por la recreaci&#243;n infantil, contamos con un amplio paquete en decoraci&#243;n, maquillaje art&#237;stico, pintucaritas, sonido profesional, luces, c&#225;mara de burbujas, c&#225;mara de humo, shows de diferentes personajes, fotograf&#237;a, producci&#243;n audiovisual y el talento humano para hacer de un evento un d&#237;a especial e inolvidable, estamos comprometidos con el esparcimiento, la sana diversi&#243;n y la felicidad de nuestros clientes. Queremos ofrecerle nuestros servicios el cual esperamos sea de su total complacencia.</div><div style="margin-top:32px;font-size:14px;line-height:1.9;">Cordialmente<br>Leidy Rosalba Castellanos Cubillos</div>';
  p1.content.insertBefore(body1,p1.footer);

  // PAGINAS DE COTIZACION con paginacion automatica
  var tot=calcTotal(d.svcs);
  var totalHtml=tot?(modo==='det'?'<div class="doc-total">Total: '+tot+'</div><div class="doc-ret-only">Libres de retenciones</div>':'<div class="doc-total-only">Valor total: '+tot+'</div><div class="doc-ret-only">Libres de retenciones</div>'):'';
  var notaHtml=d.nota?'<div class="doc-nota"><strong>Nota:</strong> '+d.nota+'</div>':'';

  var curP=makePage(false,'');container.appendChild(curP.page);
  var titleEl=document.createElement('div');titleEl.className='cot-title';titleEl.textContent='Cotizacion - '+(d.ref||'');
  curP.content.insertBefore(titleEl,curP.footer);
  var svcArea=document.createElement('div');svcArea.style.flex='1';
  curP.content.insertBefore(svcArea,curP.footer);

  // medir espacio: hdr(148) + title(50) + padding(96) + footer(40) = 334, disponible = 722
  var avail=722;
  var curH=0;var curHtml='';

  var tmp=document.createElement('div');
  tmp.style.cssText='position:absolute;visibility:hidden;width:656px;font-family:Architects Daughter,Caveat,cursive;font-size:14px;';
  document.body.appendChild(tmp);

  function newSvcPage(){
    svcArea.innerHTML=curHtml;
    curP=makePage(false,'');container.appendChild(curP.page);
    svcArea=document.createElement('div');svcArea.style.flex='1';
    curP.content.insertBefore(svcArea,curP.footer);
    curHtml='';curH=0;avail=820; // sin titulo en pags siguientes
  }

  (d.svcs||[]).forEach(function(s){
    var h=svcHtml(s,modo);
    tmp.innerHTML=h;var ht=tmp.offsetHeight+24;
    if(curH+ht>avail && curHtml){newSvcPage();}
    curHtml+=h;curH+=ht;
  });

  // Total y nota
  tmp.innerHTML=totalHtml+notaHtml;
  var extraH=tmp.offsetHeight+20;
  if(curH+extraH>avail && curHtml){newSvcPage();}
  curHtml+=totalHtml+notaHtml;
  svcArea.innerHTML=curHtml;
  document.body.removeChild(tmp);

  var adicsArr=adics||[];
  var adicsHtml='';
  if(adicsArr.length){
    adicsHtml='<div class="adicionales-title">Adicionales</div>';
    adicsArr.forEach(function(a){
      adicsHtml+='<div class="adicional-item"><span>&#8226; '+a.name+'</span><span class="adicional-dots">............................................................................</span><span class="adicional-price">'+a.price+'</span></div>';
    });
  }
  var IMGS_PER_PAGE=3;
  if(adicsArr.length||ai.length){
    if(ai.length<=IMGS_PER_PAGE){
      var ap=makePage(false,'');container.appendChild(ap.page);
      if(adicsHtml){var ae=document.createElement('div');ae.innerHTML=adicsHtml;ap.content.insertBefore(ae,ap.footer);}
      if(ai.length){var g=document.createElement('div');var cols=ai.length===1?1:2;g.className='photos-grid cols-'+cols;g.style.marginTop='20px';ai.forEach(function(s){var img=document.createElement('img');img.src=s;g.appendChild(img);});ap.content.insertBefore(g,ap.footer);}
    } else {
      if(adicsHtml){var ap2=makePage(false,'');container.appendChild(ap2.page);var ae2=document.createElement('div');ae2.innerHTML=adicsHtml;ap2.content.insertBefore(ae2,ap2.footer);}
      for(var idx=0;idx<ai.length;idx+=IMGS_PER_PAGE){container.appendChild(makePhotoPage(ai.slice(idx,idx+IMGS_PER_PAGE)));}
    }
  }
}

addSvc();
</script>

<script>

function addAdicional(){

  row.style.cssText='display:flex;gap:8px;margin-bottom:8px;align-items:center';
  var inp1=document.createElement('input');
  inp1.type='text';inp1.id='aname-'+id;inp1.placeholder='Nombre del adicional';inp1.style.flex='1';

  btn.onclick=function(){row.remove();};
  row.appendChild(inp1);row.appendChild(inp2);row.appendChild(btn);
  document.getElementById('add-list').appendChild(row);

function getAdicionales(){
  var result=[];
  document.querySelectorAll('[id^="acrow-"]').forEach(function(el){
    var i=el.id.replace('acrow-','');
    var n=document.getElementById('aname-'+i);
    var p=document.getElementById('aprice-'+i);
    if(n&&n.value.trim()) result.push({name:n.value.trim(),price:p?p.value.trim():''});
  });
  return result;
}
</script>


<script>
async function downloadPDF(){
  var btn=document.getElementById('download-btn');
  btn.textContent='Generando PDF...';
  btn.disabled=true;

  var container=document.getElementById('pages-container');
  var pages=container.querySelectorAll('.doc-page');
  var pdf=new jspdf.jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
  var pageW=612, pageH=792;

  for(var i=0;i<pages.length;i++){
    var canvas=await html2canvas(pages[i],{
      scale:2,
      useCORS:true,
      allowTaint:true,
      backgroundColor:'#ffffff',
      width:816,
      height:1056
    });
    var imgData=canvas.toDataURL('image/jpeg',0.95);
    if(i>0) pdf.addPage('letter','portrait');
    pdf.addImage(imgData,'JPEG',0,0,pageW,pageH);
  }

  var fname='Cotizacion - '+(cor&&cor.cli?cor.cli:'Cliente')+' - Happy Leidy - '+(cor&&cor.ref?cor.ref:'Cotizacion')+'.pdf';
  pdf.save(fname);
  btn.textContent='Descargar PDF';
  btn.disabled=false;
}
</script>


<script>
var SUPA_URL='https://cxwvhzkeghgnmolixlam.supabase.co';
var SUPA_KEY='sb_publishable_ezaHkIkyw5TCVOd61IiG0w_YQk9kgBi';
var supabaseClient=supabase.createClient(SUPA_URL,SUPA_KEY);
var currentCotId=null;
var allCots=[];

// Initialize - create table if needed and load list
async function initApp(){
  await loadList();
}

async function loadList(){
  var container=document.getElementById('cot-list-container');
  try{
    var resp=await supabaseClient.from('cotizaciones').select('*').order('created_at',{ascending:false});
    if(resp.error){
      // Table might not exist, show empty state
      container.innerHTML='<div class="empty-state">No hay cotizaciones aún.<br>Crea tu primera cotización.</div>';
      allCots=[];
      return;
    }
    allCots=resp.data||[];
    renderList(allCots);
  }catch(e){
    container.innerHTML='<div class="empty-state">Error cargando cotizaciones.</div>';
  }
}

function renderList(list){
  var container=document.getElementById('cot-list-container');
  if(!list.length){
    container.innerHTML='<div class="empty-state">No hay cotizaciones aún.<br>Crea tu primera cotización.</div>';
    return;
  }
  container.innerHTML=list.map(function(c){
    var fecha=new Date(c.created_at).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});
    return '<div class="cot-item">'+
      '<div class="cot-info" onclick="openCotizacion(\'' + c.id + '\')" style="flex:1">'+
      '<div class="cot-cliente">'+c.cliente+'</div>'+
      '<div class="cot-ref">'+c.referencia+'</div>'+
      '<div class="cot-fecha">'+fecha+' &nbsp;|&nbsp; Total: '+c.total+'</div>'+
      '</div>'+
      '<div class="cot-actions">'+
      '<button class="btn-edit" onclick="openCotizacion(\'' + c.id + '\')">Editar</button>'+
      '<button class="btn-del" onclick="deleteCot(\'' + c.id + '\',event)">&#215;</button>'+
      '</div></div>';
  }).join('');
}

function filterList(){
  var q=document.getElementById('search-box').value.toLowerCase();
  var filtered=allCots.filter(function(c){
    return (c.cliente||'').toLowerCase().includes(q)||(c.referencia||'').toLowerCase().includes(q);
  });
  renderList(filtered);
}

function showList(){
  document.getElementById('screen-list').classList.add('active');
  document.getElementById('screen-form').classList.remove('active');
  document.getElementById('screen-preview').classList.remove('active');
  loadList();
}

function showForm(clearData){
  if(clearData){
    currentCotId=null;
    document.getElementById('cli').value='';
    document.getElementById('fec').value='';
    document.getElementById('ref').value='';
    document.getElementById('nota').value='';
    document.getElementById('svc-list').innerHTML='';
    document.getElementById('add-list').innerHTML='';
    sc=0;si={};_ac=0;
    addSvc();
  }
  document.getElementById('screen-list').classList.remove('active');
  document.getElementById('screen-form').classList.add('active');
  document.getElementById('screen-preview').classList.remove('active');
  document.querySelector('.form-area').style.display='block';
  document.getElementById('pw').style.display='none';
}

async function openCotizacion(id){
  var cot=allCots.find(function(c){return c.id===id;});
  if(!cot)return;
  currentCotId=id;
  // Fill form
  document.getElementById('cli').value=cot.cliente||'';
  document.getElementById('fec').value=cot.fecha||'';
  document.getElementById('ref').value=cot.referencia||'';
  document.getElementById('nota').value=cot.nota||'';
  // Restore services
  document.getElementById('svc-list').innerHTML='';
  sc=0;si={};
  var svcs=JSON.parse(cot.servicios||'[]');
  svcs.forEach(function(s){
    sc++;var id=sc;si[id]=[];
    var d=document.createElement('div');d.className='svc-card';d.id='sc-'+id;
    d.innerHTML='<div class="svc-hdr"><span class="svc-num">Servicio '+id+'</span><button class="del" onclick="delSvc('+id+')">&#215;</button></div>'+
      '<div class="row r2" style="margin-bottom:8px">'+
      '<div><label>Nombre del servicio</label><input type="text" id="sn-'+id+'" value="'+s.name+'"></div>'+
      '<div><label>Precio</label><input type="text" id="sp-'+id+'" value="'+s.price+'"></div></div>'+
      '<div style="margin-bottom:8px"><label>Items del servicio</label>'+
      '<textarea id="sd-'+id+'" style="min-height:80px">'+s.desc+'</textarea></div>'+
      '<div><label>Imagenes de referencia</label><input type="file" accept="image/*" multiple style="margin-top:3px;border:none;padding:0;font-size:11px;width:auto" onchange="hImg('+id+',this)">'+
      '<div class="img-preview" id="ip-'+id+'"></div></div>';
    document.getElementById('svc-list').appendChild(d);
  });
  // Restore adicionales
  document.getElementById('add-list').innerHTML='';
  _ac=0;
  var adics=JSON.parse(cot.adicionales||'[]');
  adics.forEach(function(a){
    _ac++;var id=_ac;
    var row=document.createElement('div');row.id='acrow-'+id;
    row.style.cssText='display:flex;gap:8px;margin-bottom:8px;align-items:center';
    var inp1=document.createElement('input');inp1.type='text';inp1.id='aname-'+id;inp1.value=a.name;inp1.style.flex='1';
    var inp2=document.createElement('input');inp2.type='text';inp2.id='aprice-'+id;inp2.value=a.price;inp2.style.width='130px';
    var btn=document.createElement('button');btn.innerHTML='&#215;';
    btn.style.cssText='background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;flex-shrink:0';
    btn.onclick=function(){row.remove();};
    row.appendChild(inp1);row.appendChild(inp2);row.appendChild(btn);

async function saveCotizacion(){
  if(!currentCor){setStatus('Genera la cotizacion primero','err');return;}
  var tot=calcTotal(currentCor.svcs)||'';
  var data={
    cliente:currentCor.cli||'',
    fecha:currentCor.fec||'',
    referencia:currentCor.ref||'',
    nota:currentCor.nota||'',
    servicios:JSON.stringify(currentCor.svcs||[]),
    adicionales:JSON.stringify(getAdicionales()),
    total:tot
  };
  var resp;
  if(currentCotId){
    resp=await supabaseClient.from('cotizaciones').update(data).eq('id',currentCotId);
  }else{
    resp=await supabaseClient.from('cotizaciones').insert([data]);
    if(resp.data&&resp.data[0]) currentCotId=resp.data[0].id;
  }
  if(resp.error){
    setStatus('Error guardando: '+resp.error.message,'err');
  }else{
    setStatus('Cotizacion guardada!','ok');
  }
}

async function deleteCot(id,e){
  e.stopPropagation();
  if(!confirm('Eliminar esta cotizacion?'))return;
  await supabaseClient.from('cotizaciones').delete().eq('id',id);
  loadList();
}
